# Render Blueprint
# Deploy with: https://render.com/deploy

services:
  - type: web
    name: clearledgr-api
    env: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: CLEARLEDGR_SECRET_KEY
        generateValue: true
      - key: ENV
        value: "production"
      - key: DATABASE_URL
        fromDatabase:
          name: clearledgr-db
          property: connectionString
      - key: AP_V1_STRICT_SURFACES
        value: "true"
      - key: CLEARLEDGR_ENABLE_LEGACY_SURFACES
        value: "false"
      - key: AP_V1_ALLOW_LEGACY_SURFACES_IN_PRODUCTION
        value: "false"
      - key: QUICKBOOKS_CLIENT_ID
        sync: false
      - key: QUICKBOOKS_CLIENT_SECRET
        sync: false
      - key: XERO_CLIENT_ID
        sync: false
      - key: XERO_CLIENT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: TEAMS_APP_ID
        sync: false
      - key: TEAMS_APP_PASSWORD
        sync: false
      - key: GMAIL_PUSH_SHARED_SECRET
        sync: false
      - key: GMAIL_PUSH_ALLOW_UNVERIFIED_IN_PROD
        value: "false"
      - key: GMAIL_OAUTH_STATE_MAX_AGE_SECONDS
        value: "900"
      - key: AP_TEMPORAL_ENABLED
        value: "false"
      - key: AP_TEMPORAL_REQUIRED
        value: "false"
      - key: AP_AGENT_AUTONOMOUS_RETRY_ENABLED
        value: "true"
      - key: AP_AGENT_NON_DURABLE_RETRY_ALLOWED
        value: "false"
      - key: AP_BROWSER_RUNNER_TRUST_MODE
        value: "api_or_admin"
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: clearledgr-db
    databaseName: clearledgr
    plan: starter
